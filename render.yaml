services:
  # FastAPI Backend
  - type: web
    name: team29-backend
    env: python
    region: oregon
    plan: free
    buildCommand: cd backend && pip install poetry && poetry install --no-dev
    startCommand: cd backend && poetry run uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      # Database (Render PostgreSQL推奨。SQLiteは永続化されない)
      - key: DATABASE_URL
        sync: false

      # CORS設定（デプロイ後のVercel URLに更新）
      - key: BACKEND_CORS_ORIGINS
        value: '["https://your-app.vercel.app"]'

      # 暗号化キー（32バイトbase64）
      - key: ENCRYPTION_KEY
        generateValue: true

      # Admin API Key
      - key: ADMIN_API_KEY
        generateValue: true

      # LLM設定
      - key: LLM_PROVIDER
        value: openai

      - key: OPENAI_API_KEY
        sync: false

      - key: OPENAI_MODEL
        value: gpt-4o-mini

      # JWT設定
      - key: JWT_SECRET_KEY
        generateValue: true

      - key: JWT_ALGORITHM
        value: HS256

      - key: JWT_EXPIRE_HOURS
        value: 24

      # GitHub OAuth（GitHub App作成後に設定）
      - key: GITHUB_CLIENT_ID
        sync: false

      - key: GITHUB_CLIENT_SECRET
        sync: false

      # フロントエンドURL（Vercelデプロイ後に更新）
      - key: FRONTEND_URL
        value: https://your-app.vercel.app

      # Skill Tree Cache
      - key: SKILL_TREE_CACHE_MINUTES
        value: 10

  # PostgreSQL Database (推奨)
  - type: pserv
    name: team29-db
    env: docker
    plan: free
    repo: https://github.com/render-examples/postgresql
